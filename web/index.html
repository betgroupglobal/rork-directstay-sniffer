<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoPays Stays — Browser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="shell">
      <header class="brand-header">
        <div class="brand-logos">
          <img src="./logo-main.png" alt="NoPays Stays logo" class="hero-logo hero-logo-main" />
        </div>
        <div class="brand-copy">
          <strong>NoPays Stays</strong>
          <span>Direct booking intelligence</span>
        </div>
        <div class="brand-pill">Live</div>
      </header>

      <header class="hero">
        <p class="kicker">NoPays Stays</p>
        <h1>Find direct booking links in your browser</h1>
      </header>

      <section class="panel">
        <form id="search-form" class="form-grid">
          <label>
            API Base URL
            <input id="baseUrl" type="url" value="https://directstay-crawl-api.vercel.app" required />
          </label>

          <label>
            Search mode
            <select id="mode">
              <option value="direct_hunter">Direct Hunter</option>
              <option value="crawl">Full Crawl</option>
              <option value="airbnb">Airbnb Provider</option>
            </select>
          </label>

          <label>
            Location
            <input id="location" type="text" placeholder="Byron Bay" required />
          </label>

          <label>
            Check-in
            <input id="checkIn" type="date" />
          </label>

          <label>
            Check-out
            <input id="checkOut" type="date" />
          </label>

          <label>
            Guests
            <input id="guests" type="number" min="1" max="16" placeholder="2" />
          </label>

          <label>
            Bedrooms
            <input id="bedrooms" type="number" min="0" max="8" placeholder="2" />
          </label>

          <label>
            Bathrooms
            <input id="bathrooms" type="number" min="0" max="8" placeholder="1" />
          </label>

          <label>
            Max results
            <input id="maxResults" type="number" min="1" max="200" value="30" />
          </label>

          <div class="checks">
            <label><input id="petFriendly" type="checkbox" /> Pet friendly</label>
            <label><input id="wholeHome" type="checkbox" /> Whole home</label>
          </div>

          <div class="action-row">
            <button id="submitBtn" type="submit">Full Search</button>
            <button id="directHuntBtn" type="button">Direct Hunt</button>
          </div>
        </form>
      </section>

      <section class="panel output">
        <div class="output-head">
          <h2>Results</h2>
          <span id="meta"></span>
        </div>
        <p id="status" class="status">Enter criteria and run search.</p>
        <div id="loader" class="loader" aria-hidden="true">
          <div class="scan-field">
            <div class="scan-ping"></div>
            <div class="scan-ping delay"></div>
            <div class="scan-dot"></div>
          </div>
          <div class="loader-info">
            <div id="phaseLabel" class="phase-label">Preparing crawl</div>
            <div class="meter"><span id="meterBar"></span></div>
          </div>
        </div>
        <ul id="results" class="results"></ul>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
